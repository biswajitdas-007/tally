# SonarQube Cloud (sonarcloud.io) — free for public repositories.
# projectKey / organization are assigned when you import the repo in SonarCloud;
# for a GitHub import they default to the values below. Adjust if yours differ.
sonar.projectKey=biswajitdas-007_tally
sonar.organization=biswajitdas-007
sonar.projectName=Tally

# What to analyze
sonar.sources=src
sonar.sourceEncoding=UTF-8

# Keep generated output, tooling, and assets out of the analysis
sonar.exclusions=**/node_modules/**,.next/**,public/**,scripts/**,**/*.config.*,**/*.d.ts

# Coverage (optional) — point this at an lcov report if/when you add tests
sonar.javascript.lcov.reportPaths=coverage/lcov.info
