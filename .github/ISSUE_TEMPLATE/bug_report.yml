name: 🐛 Bug report
description: Something isn't working as expected
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! For **security vulnerabilities**, do not file a
        public issue — follow [SECURITY.md](../blob/main/SECURITY.md) instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I settle up with a friend, …
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '…'
        2. Tap '…'
        3. See error
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Device, OS, browser (and version), installed as PWA or in browser?
      placeholder: iPhone 15, iOS 18, Safari, installed PWA
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Screenshots / console errors
      description: Anything else that helps — screenshots, console output, network errors.
    validations:
      required: false
