version: 2
updates:
  # npm dependencies
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 10
    target-branch: develop
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      # Batch low-risk minor/patch bumps into a single PR to cut noise.
      minor-and-patch:
        update-types: [minor, patch]
    labels:
      - dependencies

  # GitHub Actions used in workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    target-branch: develop
    commit-message:
      prefix: "chore(ci)"
    labels:
      - dependencies
      - github-actions
