name: SonarQube Cloud

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  scan:
    name: SonarQube Cloud scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Stays green as a no-op until SONAR_TOKEN is added, so the repo isn't
      # red before Sonar is connected. Once you add the secret (see README /
      # sonar-project.properties), the scan runs automatically.
      - name: Check for SONAR_TOKEN
        id: token
        run: echo "present=${{ secrets.SONAR_TOKEN != '' }}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.token.outputs.present == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Full history gives Sonar accurate new-code / blame data.
          fetch-depth: 0

      - name: SonarQube Cloud Scan
        if: steps.token.outputs.present == 'true'
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
