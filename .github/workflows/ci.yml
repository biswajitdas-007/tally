name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Typecheck · Lint · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Pin npm to the version the lockfile was generated with, so `npm ci`
      # validates it identically to local dev (avoids lockfile-version skew).
      - name: Pin npm
        run: npm install -g npm@11.16.0

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # A build-time value is enough for `next build`; real secrets are
          # injected at deploy time on Vercel, never in CI.
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-build
